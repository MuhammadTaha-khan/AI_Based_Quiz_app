services:
  backend:
    build:
      context: ./backend
    container_name: quiz-backend
    restart: unless-stopped
    volumes:
      - quiz-data:/app/data
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: quiz-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  quiz-data:
