services:
  backend:
    build:
      context: ./backend
    container_name: quiz-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - quiz-data:/app/data
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: quiz-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  quiz-data:
